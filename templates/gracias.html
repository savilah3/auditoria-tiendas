<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gracias - Walmart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{walmart:{blue:'#0053e2',spark:'#ffc220',grayBg:'#f2f8fc'}}}}}</script>
</head>
<body class="bg-walmart-grayBg min-h-screen flex items-center justify-center p-4 font-sans">
  <div class="max-w-md w-full bg-white rounded-xl shadow-lg overflow-hidden text-center">
    <div class="bg-walmart-blue p-6 border-b-4 border-walmart-spark">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-walmart-spark mx-auto" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
      </svg>
    </div>
    <div class="p-8 space-y-4">
      <h1 class="text-2xl font-bold text-walmart-blue">¡Gracias por tu evaluación!</h1>
      <p class="text-gray-600">Tu respuesta fue registrada exitosamente. Tu aporte es clave para mejorar la experiencia de nuestros clientes. 👏</p>
      <a href="/" class="inline-block mt-4 bg-walmart-blue hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl transition duration-200">
        Hacer otra evaluación
      </a>
    </div>
  </div>
</body>
</html>
