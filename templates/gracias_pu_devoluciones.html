<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Gracias! - Pick Up y Devoluciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        walmart: {
                            blue: '#0071ce',
                            darkblue: '#0053e2',
                            spark: '#ffc220',
                            green: '#2a8703'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
    <header class="bg-walmart-darkblue text-white p-4 shadow-md">
        <div class="max-w-lg mx-auto flex items-center justify-between">
            <div>
                <h1 class="text-xl font-bold">Pick Up y Devoluciones</h1>
                <p class="text-sm text-walmart-spark font-medium">Visitas con Sentido - Líderes</p>
            </div>
        </div>
    </header>

    <main class="flex-grow p-4 max-w-lg mx-auto w-full flex flex-col justify-center items-center">
        <div class="bg-white rounded-xl shadow-lg p-8 text-center border-t-4 border-walmart-green">
            <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-12 h-12 text-walmart-green" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-4">¡Evaluación registrada!</h2>
            <p class="text-gray-600 mb-6">Gracias por completar la misión de <strong>Pick Up y Devoluciones</strong> 🛒</p>
            <p class="text-sm text-gray-500 mb-8">Tu evaluación fue enviada correctamente y ya está disponible en el dashboard.</p>
            <a href="/pu-devoluciones"
               class="inline-block bg-walmart-darkblue hover:bg-blue-800 text-white font-bold py-3 px-8 rounded-lg shadow-md transition-transform active:scale-95">
                Nueva Evaluación
            </a>
        </div>
    </main>
</body>
</html>
