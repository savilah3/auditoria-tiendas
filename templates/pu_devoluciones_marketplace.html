    <script>

        const MISSION_TYPE = "Marketplace Externo";
        const MISSION_DESC = `Tienes 45 años. Necesitas comprar una lavadora de ropa y neumáticos. Ingresas a Lider.cl para realizar tu compra. Como vives cerca de un local, prefieres escoger modalidad retiro Pick Up.<br><br>Llega el día seleccionado y te acercas al local a retirar tus productos.<br><br>Luego \"llegas a tu casa\", revisas los productos y quieres devolverlos porque no te gustaron y/o no caben.`;
        const STEPS_DATA = [
                { title: "Compra en Lider.cl", desc: "<span class=\"text-vcs-green font-bold\">Modalidad: Lider.cl / Marketplace</span><br><br>Comprando en la web.<br><br><div class=\"bg-blue-50 border border-blue-200 rounded-lg p-3 my-2\"><p class=\"text-sm font-bold text-walmart-darkblue uppercase mb-1\">🛒 Tu lista de compras:</p><p class=\"text-base font-bold text-gray-800\">• Lavadora de ropa<br>• Neumáticos</p><p class=\"text-xs text-blue-800 mt-2 font-medium italic\">💡 Puedes escoger la marca y modelo que prefieras. <strong>¡Ojo! Asegúrate de que los productos sean vendidos por vendedores externos (Marketplace).</strong></p></div>", questions: ["Búsqueda de los productos en la web (lavadora y neumáticos)", "Claridad y disponibilidad de información de los productos en la web", "Identificación clara de que los productos eran vendidos por terceros", "Claridad en los plazos de retiro estipulados para estos productos", "Selección de la opción 'Retiro en Tienda' y elección del local", "Facilidad del proceso de pago"] },
                { title: "Ahora a esperar que tu pedido esté listo", desc: "Esperando confirmación", questions: [] },
                
                { title: "Espera", desc: "Evaluando la información recibida antes de ir al local", questions: ["Claridad de la información recibida sobre el estado del pedido"] },
                { title: "Pick Up", desc: "Retirando en tienda", questions: ["Claridad de la ubicación zona Pick Up", "Tiempos de espera para recibir el pedido (promesa 5 minutos)", "Atención y disposición resolutiva del personal", "Recepción y estado del pedido"] },
                { title: "Devolución", desc: "Problemas de tamaño/gusto", questions: ["Accesibilidad y claridad de la información para realizar la devolución", "Disponibilidad de opciones para el cambio o devolución del producto", "Proceso de devolución de dinero", "Amabilidad y disposición en la atención del colaborador y/o ejecutivo contact center"] }
            ];

        // --- Wiring backend (Tor): nombres de campo descriptivos + envio POST ---
        const FIELD_NAMES = [
            ["s1_busqueda","s1_info_producto","s1_identificacion_terceros","s1_plazos_retiro","s1_retiro_tienda","s1_proceso_pago"],
            [],
            ["s3_info_estado_pedido"],
            ["s4_ubicacion_pickup","s4_tiempo_espera","s4_atencion_personal","s4_estado_pedido"],
            ["s5_info_devolucion","s5_opciones_devolucion","s5_proceso_devolucion","s5_atencion_colaborador"]
        ];
        const OBS_NAMES = ["s1_obs","","s3_obs","s4_obs","s5_obs"];
        const SUBMIT_URL = "/submit-pu-devoluciones-marketplace";
        const GRACIAS_URL = "/gracias-pu-devoluciones-marketplace";

        let currentStep = 0;
        let totalSteps = 0;

        function getRoleplayName(name) {
            if (!name) return "Pablo";
            const firstName = name.trim().split(' ')[0].toLowerCase();
            if (firstName.endsWith('a')) return "Paula";
            return "Pablo";
        }

        function assignMission() {
            const nombre = document.getElementById('input-nombre').value;
            const preview = document.getElementById('mission-preview');
            
            if (nombre.trim().length > 0) {
                document.getElementById('preview-mision-type').innerHTML = MISSION_DESC.replace('{ROLE_NAME}', getRoleplayName(nombre));
                preview.classList.remove('hidden');
            } else {
                preview.classList.add('hidden');
            }
        }

        function createRadioGroup(name, question) {
            return `
                <div class="mb-5 pb-4 border-b border-gray-100 last:border-0 last:pb-0">
                    <p class="text-sm font-semibold text-gray-800 mb-3 flex gap-2"><span class="text-walmart-darkblue">•</span> ${question}</p>
                    <div class="grid grid-cols-3 gap-2">
                        <label class="cursor-pointer relative h-full">
                            <input type="radio" name="${name}" value="sin" class="peer sr-only">
                            <div class="p-2 border border-gray-300 rounded-lg h-full flex flex-col items-center justify-center text-center peer-checked:bg-green-50 peer-checked:border-green-500 transition-colors">
                                <span class="text-3xl">😊</span>
                            </div>
                        </label>
                        <label class="cursor-pointer relative h-full">
                            <input type="radio" name="${name}" value="con" class="peer sr-only">
                            <div class="p-2 border border-gray-300 rounded-lg h-full flex flex-col items-center justify-center text-center peer-checked:bg-yellow-50 peer-checked:border-yellow-500 transition-colors">
                                <span class="text-3xl">😐</span>
                            </div>
                        </label>
                        <label class="cursor-pointer relative h-full">
                            <input type="radio" name="${name}" value="no" class="peer sr-only">
                            <div class="p-2 border border-gray-300 rounded-lg h-full flex flex-col items-center justify-center text-center peer-checked:bg-red-50 peer-checked:border-red-500 transition-colors">
                                <span class="text-3xl">☹️</span>
                            </div>
                        </label>
                    </div>
                </div>
            `;
        }

        function buildMissionSteps() {
            const container = document.getElementById('mission-steps-container');
            container.innerHTML = '';
            
            const stepsData = STEPS_DATA;
            totalSteps = stepsData.length;
            
            

            stepsData.forEach((step, index) => {
                const stepNum = index + 1;
                let questionsHtml = step.questions.map((q, qIndex) => createRadioGroup((FIELD_NAMES[index] && FIELD_NAMES[index][qIndex]) || `s${stepNum}_q${qIndex}`, q)).join('');

                let stepHtml = '';
                if (step.title.includes("Ahora a esperar que tu pedido esté listo")) {
                    stepHtml = `
                        <div id="step-${stepNum}" class="step-container hidden fade-in bg-walmart-darkblue rounded-xl shadow-lg overflow-hidden border-2 border-vcs-green text-white">
                            <div class="p-8 text-center">
                                <svg class="w-20 h-20 mx-auto text-vcs-green mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                <h2 class="font-bold text-2xl mb-3">${step.title}</h2>
                                <p class="text-base text-gray-100 mb-8 font-medium">A partir de aquí, las siguientes etapas del formulario deberán ser llenadas en otra instancia, dependiendo de tu fecha de retiro Pick Up.</p>
                            </div>
                        </div>
                    `;
                } else {
                    
                    stepHtml = `
                        <div id="step-${stepNum}" class="step-container hidden fade-in bg-white rounded-xl shadow-sm overflow-hidden border border-gray-200">
                            <div class="bg-gray-50 border-b border-gray-200 p-4">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="bg-walmart-darkblue text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">${stepNum}/${totalSteps}</span>
                                    <h2 class="font-bold text-gray-800 text-lg">${step.title}</h2>
                                </div>
                                <p class="text-xs text-gray-500 italic mt-2">${step.desc}</p>
                            </div>
                            <div class="p-4">
                                <h3 class="text-sm font-bold text-walmart-darkblue mb-4 uppercase tracking-wide">Evalúa tu experiencia:</h3>
                                ${questionsHtml}
                                <div class="mt-4 pt-4 border-t-2 border-gray-100">
                                    <label class="block text-sm font-bold text-gray-800 mb-1">Observaciones</label>
                                    <textarea name="${OBS_NAMES[index] || ('s'+stepNum+'_obs')}" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-walmart-darkblue focus:border-walmart-darkblue outline-none text-sm"></textarea>
                                </div>
                            </div>
                        </div>
                    `;
                }
                container.innerHTML += stepHtml;
            });
        }

        function updateUI() {
            try {
                document.querySelectorAll('.step-container').forEach(el => el.classList.add('hidden'));
                
                if (currentStep === 0) {
                    document.getElementById('step-0').classList.remove('hidden');
                    document.getElementById('progress-container').classList.add('hidden');
                    document.getElementById('greeting-card').classList.add('hidden');
                    document.getElementById('nav-controls').classList.add('hidden');
                    document.getElementById('nav-controls').classList.remove('flex');
                } else {
                    const stepEl = document.getElementById(`step-${currentStep}`);
                    if (stepEl) stepEl.classList.remove('hidden');
                    
                    document.getElementById('progress-container').classList.remove('hidden');
                    
                    if (currentStep === 1 || currentStep === 2) {
                        document.getElementById('greeting-card').classList.add('hidden');
                    } else {
                        document.getElementById('greeting-card').classList.remove('hidden');
                    }

                    document.getElementById('nav-controls').classList.remove('hidden');
                    document.getElementById('nav-controls').classList.add('flex');
                    
                    const pct = (currentStep / totalSteps) * 100;
                    document.getElementById('progress-bar').style.width = `${pct}%`;
                }

                if (currentStep > 0) {
                    const nextBtn = document.getElementById('next-btn');
                    if (currentStep === totalSteps) {
                        nextBtn.innerText = "Finalizar y Enviar";
                        nextBtn.classList.remove('bg-walmart-darkblue');
                        nextBtn.classList.add('bg-walmart-green', 'hover:bg-green-700');
                        nextBtn.style.backgroundColor = '#2a8703';
                    } else {
                        nextBtn.innerText = "Siguiente";
                        nextBtn.style.backgroundColor = '';
                        nextBtn.classList.add('bg-walmart-darkblue');
                        nextBtn.classList.remove('bg-walmart-green', 'hover:bg-green-700');
                    }
                }

                try {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } catch (e) {
                    window.scrollTo(0, 0);
                }
            } catch (e) {
                alert("Error UI: " + e.message);
                console.error(e);
            }
        }

        function skipToPickUp() {
            try {
                const nombre = document.getElementById('input-nombre').value;
                if (!nombre) {
                    alert("Por favor escribe tu nombre.");
                    return;
                }
                
                document.getElementById('display-mision').innerHTML = MISSION_DESC.replace('{ROLE_NAME}', getRoleplayName(nombre));
                
                buildMissionSteps();
                document.getElementById('step-0').classList.add('hidden');

                currentStep = 3; // Forzamos ir al paso 3 (Pick Up)
                updateUI();
            } catch (e) {
                alert("Error al saltar a Pick Up: " + e.message);
                console.error(e);
            }
        }

        function startJourney() {
            try {
                const nombre = document.getElementById('input-nombre').value;
                if (!nombre) {
                    alert("Por favor escribe tu nombre.");
                    return;
                }
                
                document.getElementById('display-mision').innerHTML = MISSION_DESC.replace('{ROLE_NAME}', getRoleplayName(nombre));
                
                buildMissionSteps();
                
                document.getElementById('step-0').classList.add('hidden');

                currentStep = 1;
                updateUI();
            } catch (e) {
                alert("Error al iniciar mision: " + e.message);
                console.error(e);
            }
        }

function nextStep() {
    try {
        if (currentStep < totalSteps) {
            currentStep++;
            updateUI();
        } else {
            const nombre = document.getElementById('input-nombre').value;
            const VALUE_MAP = { sin: 'Sin problema', con: 'Con dificultad', no: 'No lo logro' };
            const fd = new FormData();
            fd.append('nombre', nombre);
            document.querySelectorAll("input[type='radio']:checked").forEach(r => {
                fd.append(r.name, VALUE_MAP[r.value] || r.value);
            });
            document.querySelectorAll("textarea[name]").forEach(t => {
                fd.append(t.name, t.value.trim());
            });
            const sendBtn = document.getElementById('next-btn');
            if (sendBtn) { sendBtn.disabled = true; sendBtn.innerText = 'Enviando...'; }
            fetch(SUBMIT_URL, { method: 'POST', body: fd })
                .then(resp => {
                    if (!resp.ok) throw new Error('HTTP ' + resp.status);
                    window.location.href = GRACIAS_URL;
                })
                .catch(err => {
                    alert('Error al enviar: ' + err.message);
                    if (sendBtn) { sendBtn.disabled = false; sendBtn.innerText = 'Finalizar y Enviar'; }
                });
        }
    } catch (err) {
        alert("Error en nextStep: " + err.message);
        console.error(err);
    }
}

        function prevStep() {
            if (currentStep > 1) {
                currentStep--;
                updateUI();
            } else if (currentStep === 1) {
                currentStep = 0;
                updateUI();
            }
        }
    </script>
</body>
</html>
